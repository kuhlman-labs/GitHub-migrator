name: Dev Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Set minimal permissions for the workflow
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TF_VERSION: '1.6'
  WORKING_DIR: terraform/environments/dev

jobs:
  # Job 1: Run CI tests in parallel
  ci-tests:
    name: CI Tests
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write

  # Job 2: Check for terraform changes and auto-apply
  terraform:
    name: Terraform Auto-Apply
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      changed: ${{ steps.terraform-changes.outputs.changed }}
      applied: ${{ steps.apply.outcome == 'success' }}
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for terraform changes
        id: terraform-changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger - checking for terraform changes"
            if [ -d "terraform/" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "Terraform directory exists, will check"
            fi
          else
            # Check if terraform files changed in this push
            if git diff --name-only HEAD^ HEAD | grep -q '^terraform/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "Terraform files changed"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "No terraform changes detected"
            fi
          fi

      - name: Setup Terraform
        if: steps.terraform-changes.outputs.changed == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        if: steps.terraform-changes.outputs.changed == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Extract Azure credentials for Terraform
        if: steps.terraform-changes.outputs.changed == 'true'
        run: |
          CLIENT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientId')
          CLIENT_SECRET=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.clientSecret')
          TENANT_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.tenantId')
          SUBSCRIPTION_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.subscriptionId')

          echo "ARM_CLIENT_ID=${CLIENT_ID}" >> $GITHUB_ENV
          echo "ARM_CLIENT_SECRET=${CLIENT_SECRET}" >> $GITHUB_ENV
          echo "ARM_TENANT_ID=${TENANT_ID}" >> $GITHUB_ENV
          echo "ARM_SUBSCRIPTION_ID=${SUBSCRIPTION_ID}" >> $GITHUB_ENV
          echo "ARM_USE_CLI=false" >> $GITHUB_ENV

      - name: Create terraform.tfvars from environment secrets
        if: steps.terraform-changes.outputs.changed == 'true'
        run: |
          cat > terraform.tfvars <<'TFVARS_EOF'
          # Azure Configuration
          azure_subscription_id = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          resource_group_name   = "${{ secrets.AZURE_RESOURCE_GROUP }}"
          location              = "${{ vars.AZURE_LOCATION || 'eastus' }}"

          # Application Configuration
          app_name_prefix = "${{ vars.APP_NAME_PREFIX }}"
          app_service_sku = "${{ vars.APP_SERVICE_SKU }}"
          always_on       = ${{ vars.ALWAYS_ON }}

          # Docker Configuration
          docker_registry_url       = "ghcr.io"
          docker_image_repository   = "${{ github.repository }}"
          docker_image_tag          = "${{ vars.DOCKER_IMAGE_TAG }}"
          docker_registry_username  = "${{ github.actor }}"
          docker_registry_password  = "${{ secrets.GITHUB_TOKEN }}"

          # Source Configuration
          source_type     = "${{ vars.SOURCE_TYPE }}"
          source_base_url = "${{ vars.SOURCE_BASE_URL }}"
          source_token    = "${{ secrets.SOURCE_GITHUB_TOKEN }}"
          TFVARS_EOF

          # Add GitHub App configuration if enabled
          if [ -n "${{ vars.SOURCE_APP_ID }}" ] && [ "${{ vars.SOURCE_APP_ID }}" != "0" ]; then
            echo "" >> terraform.tfvars
            echo "# Source GitHub App Configuration" >> terraform.tfvars
            echo "source_app_id = ${{ vars.SOURCE_APP_ID }}" >> terraform.tfvars

            cat >> terraform.tfvars <<'PRIVATE_KEY_EOF'
          source_app_private_key = <<-EOT
          ${{ secrets.SOURCE_APP_PRIVATE_KEY }}
          EOT
          PRIVATE_KEY_EOF

            if [ -n "${{ vars.SOURCE_APP_INSTALLATION_ID }}" ] && [ "${{ vars.SOURCE_APP_INSTALLATION_ID }}" != "0" ]; then
              echo "source_app_installation_id = ${{ vars.SOURCE_APP_INSTALLATION_ID }}" >> terraform.tfvars
            fi
          fi

          # Continue with rest of configuration
          cat >> terraform.tfvars <<'TFVARS_EOF'

          # Destination Configuration
          destination_type     = "${{ vars.DESTINATION_TYPE }}"
          destination_base_url = "${{ vars.DESTINATION_BASE_URL }}"
          destination_token    = "${{ secrets.DEST_GITHUB_TOKEN }}"
          TFVARS_EOF

          # Add Destination GitHub App configuration if enabled
          if [ -n "${{ vars.DEST_APP_ID }}" ] && [ "${{ vars.DEST_APP_ID }}" != "0" ]; then
            echo "" >> terraform.tfvars
            echo "# Destination GitHub App Configuration" >> terraform.tfvars
            echo "dest_app_id = ${{ vars.DEST_APP_ID }}" >> terraform.tfvars

            cat >> terraform.tfvars <<'DEST_PRIVATE_KEY_EOF'
          dest_app_private_key = <<-EOT
          ${{ secrets.DEST_APP_PRIVATE_KEY }}
          EOT
          DEST_PRIVATE_KEY_EOF

            if [ -n "${{ vars.DEST_APP_INSTALLATION_ID }}" ] && [ "${{ vars.DEST_APP_INSTALLATION_ID }}" != "0" ]; then
              echo "dest_app_installation_id = ${{ vars.DEST_APP_INSTALLATION_ID }}" >> terraform.tfvars
            fi
          fi

          # Continue with rest of configuration
          cat >> terraform.tfvars <<'TFVARS_EOF'

          # Migration Configuration
          migration_workers                      = ${{ vars.MIGRATION_WORKERS }}
          migration_poll_interval_seconds        = ${{ vars.MIGRATION_POLL_INTERVAL_SECONDS }}
          migration_post_migration_mode          = "${{ vars.MIGRATION_POST_MIGRATION_MODE }}"
          migration_dest_repo_exists_action      = "${{ vars.MIGRATION_DEST_REPO_EXISTS_ACTION }}"
          migration_visibility_public_repos      = "${{ vars.MIGRATION_VISIBILITY_PUBLIC_REPOS }}"
          migration_visibility_internal_repos    = "${{ vars.MIGRATION_VISIBILITY_INTERNAL_REPOS }}"

          # Logging Configuration
          logging_level  = "${{ vars.LOGGING_LEVEL }}"
          logging_format = "${{ vars.LOGGING_FORMAT }}"

          # Auth Configuration
          auth_enabled                     = ${{ vars.AUTH_ENABLED }}
          auth_github_oauth_client_id      = "${{ secrets.AUTH_GITHUB_OAUTH_CLIENT_ID }}"
          auth_github_oauth_client_secret  = "${{ secrets.AUTH_GITHUB_OAUTH_CLIENT_SECRET }}"
          auth_callback_url                = "${{ vars.AUTH_CALLBACK_URL }}"
          auth_frontend_url                = "${{ vars.AUTH_FRONTEND_URL }}"
          auth_session_secret              = "${{ secrets.AUTH_SESSION_SECRET }}"
          auth_session_duration_hours      = ${{ vars.AUTH_SESSION_DURATION_HOURS }}

          # Auth Authorization Rules
          auth_require_org_membership      = ${{ vars.AUTH_REQUIRE_ORG_MEMBERSHIP || '[]' }}
          auth_require_team_membership     = ${{ vars.AUTH_REQUIRE_TEAM_MEMBERSHIP || '[]' }}
          auth_require_enterprise_admin    = ${{ vars.AUTH_REQUIRE_ENTERPRISE_ADMIN || 'false' }}
          auth_require_enterprise_slug     = "${{ vars.AUTH_REQUIRE_ENTERPRISE_SLUG || '' }}"

          # CORS Configuration
          cors_allowed_origins = ${{ vars.CORS_ALLOWED_ORIGINS || '["*"]' }}

          # Tags
          tags = {
            Project     = "GitHub Migrator"
            Environment = "${{ vars.ENVIRONMENT_NAME }}"
            ManagedBy   = "Terraform"
            DeployedBy  = "GitHub Actions"
          }
          TFVARS_EOF

      - name: Format terraform.tfvars
        if: steps.terraform-changes.outputs.changed == 'true'
        run: terraform fmt terraform.tfvars

      - name: Terraform Init
        if: steps.terraform-changes.outputs.changed == 'true'
        run: terraform init

      - name: Terraform Validate
        if: steps.terraform-changes.outputs.changed == 'true'
        run: terraform validate

      - name: Terraform Plan
        if: steps.terraform-changes.outputs.changed == 'true'
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        id: apply
        if: steps.terraform-changes.outputs.changed == 'true'
        run: terraform apply -auto-approve tfplan

      - name: Get Outputs
        if: steps.terraform-changes.outputs.changed == 'true' && steps.apply.outcome == 'success'
        run: |
          echo "## Terraform Auto-Applied (Dev)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**App Service URL:** $(terraform output -raw app_service_url)" >> $GITHUB_STEP_SUMMARY
          echo "**App Service Name:** $(terraform output -raw app_service_name)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure updated automatically based on terraform changes." >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always() && steps.terraform-changes.outputs.changed == 'true'
        run: |
          rm -f terraform.tfvars
          az logout || true

  # Job 3: Build and push Docker image
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=dev
            type=raw,value=latest

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Output image tags
        run: |
          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built and pushed the following tags:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image digest:** \`${{ steps.push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # Job 4: Deploy to dev environment
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [ci-tests, terraform, build]
    if: success()
    environment:
      name: dev
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.APP_SERVICE_NAME }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:dev

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        run: |
          APP_URL="${{ steps.deploy.outputs.webapp-url }}"
          echo "Checking health endpoint: ${APP_URL}/health"

          for i in {1..10}; do
            if curl -f -s "${APP_URL}/health" > /dev/null; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "⏳ Waiting for app to be ready... (attempt $i/10)"
            sleep 10
          done

          echo "❌ Health check failed after 10 attempts"
          exit 1

      - name: Deployment summary
        run: |
          echo "## Dev Deployment Successful! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Dev" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.webapp-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:dev" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.terraform.outputs.changed }}" == "true" ]; then
            echo "**Infrastructure:** ✅ Terraform changes applied automatically" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Infrastructure:** No changes" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Logout from Azure
        run: az logout
        if: ${{ !cancelled() }}

