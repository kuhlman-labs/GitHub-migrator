name: PR Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

# Set minimal permissions for the workflow
permissions:
  contents: read
  packages: write
  id-token: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and deploy preview environment
  deploy-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    environment:
      name: pr-${{ github.event.pull_request.number }}
      url: https://${{ vars.APP_SERVICE_NAME }}-pr-${{ github.event.pull_request.number }}.azurewebsites.net

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check if deployment slot exists
        id: check-slot
        run: |
          SLOT_NAME="pr-${{ github.event.pull_request.number }}"
          if az webapp deployment slot list \
            --name ${{ vars.APP_SERVICE_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "[?name=='${SLOT_NAME}'].name" -o tsv | grep -q "${SLOT_NAME}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Slot ${SLOT_NAME} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Slot ${SLOT_NAME} does not exist"
          fi

      - name: Create deployment slot
        if: steps.check-slot.outputs.exists == 'false'
        run: |
          SLOT_NAME="pr-${{ github.event.pull_request.number }}"
          echo "Creating deployment slot: ${SLOT_NAME}"
          
          az webapp deployment slot create \
            --name ${{ vars.APP_SERVICE_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --slot ${SLOT_NAME} \
            --configuration-source ${{ vars.APP_SERVICE_NAME }}
          
          echo "Slot created successfully"

      - name: Configure slot with container image
        run: |
          SLOT_NAME="pr-${{ github.event.pull_request.number }}"
          
          # Configure container settings
          az webapp config container set \
            --name ${{ vars.APP_SERVICE_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --slot ${SLOT_NAME} \
            --docker-custom-image-name ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:pr-${{ github.event.pull_request.number }} \
            --docker-registry-server-url https://${{ env.REGISTRY }} \
            --docker-registry-server-user ${{ github.actor }} \
            --docker-registry-server-password ${{ secrets.GITHUB_TOKEN }}

      - name: Restart slot to apply changes
        run: |
          SLOT_NAME="pr-${{ github.event.pull_request.number }}"
          az webapp restart \
            --name ${{ vars.APP_SERVICE_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --slot ${SLOT_NAME}

      - name: Wait for deployment to stabilize
        run: sleep 45

      - name: Get slot URL
        id: slot-url
        run: |
          SLOT_NAME="pr-${{ github.event.pull_request.number }}"
          URL="https://${{ vars.APP_SERVICE_NAME }}-${SLOT_NAME}.azurewebsites.net"
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Preview URL: ${URL}"

      - name: Health check
        id: health-check
        run: |
          URL="${{ steps.slot-url.outputs.url }}"
          echo "Checking health endpoint: ${URL}/health"

          for i in {1..15}; do
            if curl -f -s "${URL}/health" > /dev/null 2>&1; then
              echo "✅ Health check passed!"
              echo "healthy=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "⏳ Waiting for app to be ready... (attempt $i/15)"
            sleep 10
          done

          echo "⚠️ Health check did not pass, but deployment completed"
          echo "healthy=false" >> $GITHUB_OUTPUT

      - name: Comment on PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const url = '${{ steps.slot-url.outputs.url }}';
            const healthy = '${{ steps.health-check.outputs.healthy }}' === 'true';
            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            
            const healthStatus = healthy ? '✅ Healthy' : '⚠️ Health check pending';
            
            const body = `## 🚀 Preview Environment Ready
            
            **Preview URL:** ${url}
            **Status:** ${healthStatus}
            **Commit:** \`${sha}\`
            **Image:** \`ghcr.io/${{ github.repository }}:pr-${prNumber}\`
            
            This preview environment will be automatically deleted when the PR is closed.
            
            ### Quick Links
            - 🏥 [Health Check](${url}/health)
            - 📊 [Analytics](${url}/api/v1/analytics/summary)
            
            ---
            *Preview environments are ephemeral and use the dev configuration.*`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Preview Environment Ready')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }

      - name: Deployment summary
        run: |
          echo "## PR Preview Deployment Successful! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Preview URL:** ${{ steps.slot-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Slot Name:** pr-${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:pr-${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The preview environment will be automatically deleted when the PR is closed." >> $GITHUB_STEP_SUMMARY

      - name: Logout from Azure
        run: az logout
        if: ${{ !cancelled() }}

  # Cleanup preview environment when PR is closed
  cleanup-preview:
    name: Cleanup PR Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check if deployment slot exists
        id: check-slot
        run: |
          SLOT_NAME="pr-${{ github.event.pull_request.number }}"
          if az webapp deployment slot list \
            --name ${{ vars.APP_SERVICE_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "[?name=='${SLOT_NAME}'].name" -o tsv | grep -q "${SLOT_NAME}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Slot ${SLOT_NAME} exists and will be deleted"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Slot ${SLOT_NAME} does not exist, nothing to clean up"
          fi

      - name: Delete deployment slot
        if: steps.check-slot.outputs.exists == 'true'
        run: |
          SLOT_NAME="pr-${{ github.event.pull_request.number }}"
          echo "Deleting deployment slot: ${SLOT_NAME}"
          
          az webapp deployment slot delete \
            --name ${{ vars.APP_SERVICE_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --slot ${SLOT_NAME}
          
          echo "✅ Slot deleted successfully"

      - name: Comment on PR about cleanup
        if: steps.check-slot.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            
            const body = `## 🧹 Preview Environment Cleaned Up
            
            The preview environment for PR #${prNumber} has been automatically deleted.
            
            **Slot Name:** \`pr-${prNumber}\`
            **Status:** ✅ Deleted`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });

      - name: Cleanup summary
        run: |
          echo "## Preview Environment Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-slot.outputs.exists }}" == "true" ]; then
            echo "✅ Deployment slot \`pr-${{ github.event.pull_request.number }}\` deleted successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No deployment slot found to clean up" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Logout from Azure
        run: az logout
        if: ${{ !cancelled() }}

