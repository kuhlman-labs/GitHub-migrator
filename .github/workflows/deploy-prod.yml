name: Deploy to Production Environment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (leave empty to build from current commit)'
        required: false
        default: ''

# Set minimal permissions for the workflow
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build Docker image (if needed)
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag == '')
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image-tag: ${{ steps.determine-tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image tag
        id: determine-tag
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            # Use commit sha for manual builds
            TAG="prod-${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Using image tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.determine-tag.outputs.tag }}
            type=raw,value=prod,enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Output image tags
        run: |
          echo "## Docker Image Built for Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built and pushed the following tags:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image digest:** \`${{ steps.push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    environment:
      name: prod
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image tag
        id: image-tag
        run: |
          # If image was built, use that tag
          if [ -n "${{ needs.build.outputs.image-tag }}" ]; then
            TAG="${{ needs.build.outputs.image-tag }}"
          # If manual dispatch with specific tag, use that
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          # Default to prod tag
          else
            TAG="prod"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Using image tag: ${TAG}"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Pre-deployment backup (optional)
        run: |
          echo "ℹ️ Consider backing up database before production deployment"
          echo "This can be automated with Azure CLI commands if needed"

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.APP_SERVICE_NAME }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ steps.image-tag.outputs.tag }}

      - name: Wait for deployment to stabilize
        run: sleep 45

      - name: Health check
        run: |
          APP_URL="${{ steps.deploy.outputs.webapp-url }}"
          echo "Checking health endpoint: ${APP_URL}/health"

          for i in {1..15}; do
            if curl -f -s "${APP_URL}/health" > /dev/null; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "⏳ Waiting for app to be ready... (attempt $i/15)"
            sleep 10
          done

          echo "❌ Health check failed after 15 attempts"
          exit 1

      - name: Post-deployment verification
        run: |
          APP_URL="${{ steps.deploy.outputs.webapp-url }}"

          echo "Running post-deployment verification..."

          # Check if API responds
          if curl -f -s "${APP_URL}/api/v1/analytics/summary" > /dev/null 2>&1; then
            echo "✅ API endpoints are responding"
          else
            echo "⚠️ API endpoints may require authentication"
          fi

          echo "✅ Post-deployment verification complete"

      - name: Deployment summary
        run: |
          echo "## Production Deployment Successful! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.webapp-url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ steps.image-tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Post-Deployment Tasks" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Verify application functionality" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Monitor application logs" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Check database connectivity" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Verify authentication if enabled" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "## ❌ Production Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please check the logs and consider rolling back if necessary." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Attempted Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:${{ steps.image-tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY

      - name: Logout from Azure
        run: az logout
        if: ${{ !cancelled() }}
